- name: Deploy with Docker Compose
  run: |
    ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
      set -e

      cd /var/www/JppHub || exit 1

      git fetch origin
      git reset --hard origin/main

      sudo docker-compose down
      sudo docker-compose up -d --build

      # Configurar Nginx del host como reverse proxy
      sudo cp nginx/site.conf /etc/nginx/sites-available/jpphub
      sudo ln -sf /etc/nginx/sites-available/jpphub /etc/nginx/sites-enabled/
      sudo nginx -t
      sudo systemctl reload nginx

      echo "Deploy OK"
    EOF
