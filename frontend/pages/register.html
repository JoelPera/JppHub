<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta · JppHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-wrap">
        <aside class="auth-side">
            <a href="/" class="brand" data-testid="register-brand-link">JppHub</a>
            <div class="auth-quote">
                <p>Únete a más de <strong>250 autores</strong> que ya publican contenido validado sobre IA y automatización.</p>
                <p style="color: var(--text-muted); font-size: .9rem; margin-top:1rem;">Crea tu cuenta gratis en 30 segundos.</p>
            </div>
            <div style="color: var(--text-subtle); font-size: .82rem;">© 2026 JppHub</div>
        </aside>

        <main class="auth-main">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Crea tu cuenta</h1>
                    <p>Empieza a publicar en JppHub hoy mismo.</p>
                </div>

                <div id="auth-alert" class="alert"></div>

                <button type="button" class="btn-secondary" id="google-register-btn"
                        style="width:100%; justify-content:center; gap:.6rem; margin-bottom:1rem;"
                        data-testid="register-google-btn">
                    <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
                        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.5l6.7-6.7C35.5 2.5 30.1 0 24 0 14.8 0 6.8 5.3 2.9 13l7.9 6.1C12.8 13 17.9 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9h12.7c-.6 3-2.4 5.6-5.1 7.3l7.9 6.1c4.6-4.2 7-10.4 7-17.7z"/>
                        <path fill="#FBBC05" d="M10.8 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6L2.9 13.3C1 17 0 20.4 0 24s1 7 2.9 10.7l7.9-6.1z"/>
                        <path fill="#34A853" d="M24 48c6.1 0 11.2-2 15-5.5l-7.9-6.1c-2.2 1.5-5 2.4-7.1 2.4-6.1 0-11.2-3.5-13.2-9.5l-7.9 6.1C6.8 42.7 14.8 48 24 48z"/>
                    </svg>
                    Registrarse con Google
                </button>

                <div style="display:flex; align-items:center; gap:.75rem; margin:1rem 0; color: var(--text-muted); font-size:.82rem;">
                    <span style="flex:1; height:1px; background: var(--border);"></span>
                    o con email
                    <span style="flex:1; height:1px; background: var(--border);"></span>
                </div>

                <form id="register-form" data-testid="register-form">
                    <div class="form-row">
                        <label>Nombre
                            <input type="text" id="first_name" required data-testid="register-firstname-input">
                        </label>
                        <label>Apellido
                            <input type="text" id="last_name" required data-testid="register-lastname-input">
                        </label>
                    </div>
                    <label>Correo electrónico
                        <input type="email" id="email" required data-testid="register-email-input">
                    </label>
                    <label>Contraseña
                        <input type="password" id="password" minlength="8" required data-testid="register-password-input">
                        <small style="color: var(--text-muted); font-size: .78rem;">Mínimo 8 caracteres</small>
                    </label>
                    <label>Confirmar contraseña
                        <input type="password" id="confirm_password" minlength="8" required data-testid="register-confirm-password-input">
                    </label>
                    <button type="submit" id="register-btn" data-testid="register-submit-btn">Crear cuenta</button>
                </form>

                <div class="auth-links">
                    ¿Ya tienes cuenta? <a href="/login" data-testid="register-login-link">Inicia sesión</a>
                </div>
            </div>
        </main>
    </div>

    <script src="/utils/api.js"></script>
    <script src="/utils/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            if (auth.isAuthenticated) {
                window.location.href = '/dashboard';
                return;
            }

            const form = document.getElementById('register-form');
            const btn = document.getElementById('register-btn');
            const alertEl = document.getElementById('auth-alert');

            function show(type, msg) {
                alertEl.className = `alert alert-${type} show`;
                alertEl.textContent = msg;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                alertEl.className = 'alert';
                const firstName = document.getElementById('first_name').value.trim();
                const lastName = document.getElementById('last_name').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const confirm = document.getElementById('confirm_password').value;

                if (password !== confirm) {
                    show('error', 'Las contraseñas no coinciden');
                    return;
                }
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>Creando cuenta…';
                try {
                    const res = await auth.register({
                        name: `${firstName} ${lastName}`.trim(),
                        email, password
                    });
                    show('success', '¡Cuenta creada! Redirigiendo…');
                    setTimeout(() => {
                        window.location.href = res.user?.role === 'admin' ? '/admin' : '/dashboard';
                    }, 600);
                } catch (err) {
                    show('error', err.message || 'No se pudo crear la cuenta');
                    btn.disabled = false;
                    btn.textContent = 'Crear cuenta';
                }
            });

            // REMINDER: DO NOT HARDCODE THE URL, OR ADD ANY FALLBACKS OR REDIRECT URLS, THIS BREAKS THE AUTH
            document.getElementById('google-register-btn').addEventListener('click', () => {
                const redirectUrl = window.location.origin + '/dashboard';
                window.location.href = `https://auth.emergentagent.com/?redirect=${encodeURIComponent(redirectUrl)}`;
            });
        });
    </script>
</body>
</html>
