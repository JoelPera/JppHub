<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - JppHub</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dashboard-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
        }

        .dashboard-header {
            background: rgba(15, 23, 42, 0.95);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .dashboard-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-nav h1 {
            color: var(--text);
            margin: 0;
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-secondary {
            padding: 0.5rem 1rem;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
        }

        .btn-danger {
            padding: 0.5rem 1rem;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .dashboard-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .dashboard-sidebar {
            background: var(--surface-strong);
            border-radius: var(--radius-large);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .user-info {
            text-align: center;
            margin-bottom: 2rem;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }

        .user-details h3 {
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .user-details p {
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .subscription-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .subscription-free {
            background: rgba(156, 163, 175, 0.2);
            color: #9ca3af;
        }

        .subscription-premium {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .subscription-admin {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .dashboard-content {
            background: var(--surface-strong);
            border-radius: var(--radius-large);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .section-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-header h2 {
            color: var(--text);
            margin: 0;
        }

        .articles-grid {
            display: grid;
            gap: 1rem;
        }

        .article-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1rem;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .article-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .article-title {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }

        .article-title:hover {
            color: var(--primary);
        }

        .article-meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .article-excerpt {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-nav {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .nav-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <nav class="dashboard-nav">
                <h1>JppHub Dashboard</h1>
                <div class="nav-actions">
                    <a href="../index.html" class="btn-secondary">← Volver al sitio</a>
                    <button id="logout-btn" class="btn-danger">Cerrar Sesión</button>
                </div>
            </nav>
        </header>

        <main class="dashboard-main">
            <div class="dashboard-grid">
                <aside class="dashboard-sidebar">
                    <div id="user-info" class="user-info">
                        <div class="loading">Cargando...</div>
                    </div>
                </aside>

                <section class="dashboard-content">
                    <div class="section-header">
                        <h2>Últimos Artículos</h2>
                    </div>

                    <div id="articles-container">
                        <div class="loading">Cargando artículos...</div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="../utils/api.js"></script>
    <script src="../utils/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check authentication
            if (!auth.checkAuth()) return;

            loadUserInfo();
            loadArticles();

            // Logout handler
            document.getElementById('logout-btn').addEventListener('click', function() {
                auth.logout();
            });
        });

        async function loadUserInfo() {
            try {
                const user = auth.getUser();
                const userInfo = document.getElementById('user-info');

                if (user) {
                    const subscriptionClass = user.role === 'admin' ? 'subscription-admin' :
                                           user.subscription_status === 'premium' ? 'subscription-premium' :
                                           'subscription-free';

                    const subscriptionText = user.role === 'admin' ? 'Admin' :
                                           user.subscription_status === 'premium' ? 'Premium' :
                                           'Free';

                    userInfo.innerHTML = `
                        <div class="user-avatar">${user.first_name.charAt(0)}${user.last_name.charAt(0)}</div>
                        <div class="user-details">
                            <h3>${user.first_name} ${user.last_name}</h3>
                            <p>${user.email}</p>
                            <span class="subscription-badge ${subscriptionClass}">${subscriptionText}</span>
                        </div>
                    `;
                } else {
                    // Try to fetch from API
                    const userData = await api.getCurrentUser();
                    auth.setUser(userData);
                    loadUserInfo(); // Reload with new data
                }
            } catch (error) {
                console.error('Error loading user info:', error);
                document.getElementById('user-info').innerHTML = `
                    <div class="error-message">
                        Error al cargar información del usuario
                    </div>
                `;
            }
        }

        async function loadArticles() {
            try {
                const response = await api.getArticles({ limit: 10 });
                const articles = response.articles || response;

                const container = document.getElementById('articles-container');
                container.innerHTML = '';

                if (articles.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No hay artículos disponibles</p>';
                    return;
                }

                const articlesGrid = document.createElement('div');
                articlesGrid.className = 'articles-grid';

                articles.forEach(article => {
                    const card = document.createElement('div');
                    card.className = 'article-card';

                    const publishDate = new Date(article.created_at).toLocaleDateString('es-ES');

                    card.innerHTML = `
                        <a href="../articles/article.html?id=${article.id}" class="article-title">${article.title}</a>
                        <div class="article-meta">
                            ${publishDate} • ${article.views || 0} vistas
                        </div>
                        <div class="article-excerpt">
                            ${article.excerpt || article.content?.substring(0, 150) + '...' || 'Sin descripción disponible'}
                        </div>
                    `;

                    articlesGrid.appendChild(card);
                });

                container.appendChild(articlesGrid);
            } catch (error) {
                console.error('Error loading articles:', error);
                document.getElementById('articles-container').innerHTML = `
                    <div class="error-message">
                        Error al cargar artículos. Inténtalo de nuevo más tarde.
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
