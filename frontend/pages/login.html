<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión · JppHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-wrap">
        <aside class="auth-side">
            <a href="/" class="brand" data-testid="login-brand-link">JppHub</a>
            <div class="auth-quote">
                <p>“JppHub cambió mi flujo de publicación. Envío el artículo, el equipo lo revisa y <strong>en 12 horas ya está publicado.</strong>”</p>
                <p style="color: var(--text-muted); font-size: .9rem; margin-top: 1rem;">— María G., autora desde 2025</p>
            </div>
            <div style="color: var(--text-subtle); font-size: .82rem;">© 2026 JppHub</div>
        </aside>

        <main class="auth-main">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Bienvenido de vuelta</h1>
                    <p>Inicia sesión para continuar en JppHub.</p>
                </div>

                <div id="auth-alert" class="alert alert-error"></div>

                <button type="button" class="btn-secondary" id="google-login-btn"
                        style="width:100%; justify-content:center; gap:.6rem; margin-bottom:1rem;"
                        data-testid="login-google-btn">
                    <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
                        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.5l6.7-6.7C35.5 2.5 30.1 0 24 0 14.8 0 6.8 5.3 2.9 13l7.9 6.1C12.8 13 17.9 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9h12.7c-.6 3-2.4 5.6-5.1 7.3l7.9 6.1c4.6-4.2 7-10.4 7-17.7z"/>
                        <path fill="#FBBC05" d="M10.8 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6L2.9 13.3C1 17 0 20.4 0 24s1 7 2.9 10.7l7.9-6.1z"/>
                        <path fill="#34A853" d="M24 48c6.1 0 11.2-2 15-5.5l-7.9-6.1c-2.2 1.5-5 2.4-7.1 2.4-6.1 0-11.2-3.5-13.2-9.5l-7.9 6.1C6.8 42.7 14.8 48 24 48z"/>
                    </svg>
                    Entrar con Google
                </button>

                <div style="display:flex; align-items:center; gap:.75rem; margin:1rem 0; color: var(--text-muted); font-size:.82rem;">
                    <span style="flex:1; height:1px; background: var(--border);"></span>
                    o con tu email
                    <span style="flex:1; height:1px; background: var(--border);"></span>
                </div>

                <form id="login-form" data-testid="login-form">
                    <label>Correo electrónico
                        <input type="email" id="email" required autocomplete="email" data-testid="login-email-input">
                    </label>
                    <label>Contraseña
                        <input type="password" id="password" required autocomplete="current-password" data-testid="login-password-input">
                    </label>
                    <button type="submit" id="login-btn" data-testid="login-submit-btn">Iniciar sesión</button>
                </form>

                <div class="auth-links">
                    ¿No tienes cuenta? <a href="/register" data-testid="login-register-link">Regístrate gratis</a>
                </div>
            </div>
        </main>
    </div>

    <script src="/utils/api.js"></script>
    <script src="/utils/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            // Si ya está autenticado → dashboard
            if (auth.isAuthenticated) {
                const user = auth.getUser();
                window.location.href = user?.role === 'admin' ? '/admin' : '/dashboard';
                return;
            }

            const form = document.getElementById('login-form');
            const btn = document.getElementById('login-btn');
            const alert = document.getElementById('auth-alert');

            function showError(msg) {
                alert.className = 'alert alert-error show';
                alert.textContent = msg;
            }

            // Email/password login
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                alert.className = 'alert';
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>Iniciando…';
                try {
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;
                    const res = await auth.login(email, password);
                    window.location.href = res.user?.role === 'admin' ? '/admin' : '/dashboard';
                } catch (err) {
                    showError(err.message || 'No se pudo iniciar sesión');
                    btn.disabled = false;
                    btn.textContent = 'Iniciar sesión';
                }
            });

            // Google login
            // REMINDER: DO NOT HARDCODE THE URL, OR ADD ANY FALLBACKS OR REDIRECT URLS, THIS BREAKS THE AUTH
            document.getElementById('google-login-btn').addEventListener('click', () => {
                const redirectUrl = window.location.origin + '/dashboard';
                window.location.href = `https://auth.emergentagent.com/?redirect=${encodeURIComponent(redirectUrl)}`;
            });
        });
    </script>
</body>
</html>
