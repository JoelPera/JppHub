<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - JppHub</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
        }

        .admin-header {
            background: rgba(15, 23, 42, 0.95);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .admin-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-nav h1 {
            color: var(--text);
            margin: 0;
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-secondary {
            padding: 0.5rem 1rem;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
        }

        .btn-danger {
            padding: 0.5rem 1rem;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .admin-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .admin-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius) var(--radius) 0 0;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--surface-strong);
            color: var(--text);
            border-bottom: 2px solid var(--primary);
        }

        .tab-content {
            background: var(--surface-strong);
            border-radius: var(--radius-large);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: var(--surface);
            font-weight: 600;
            color: var(--text);
        }

        .data-table tr:hover {
            background: var(--surface-hover);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-active {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status-inactive {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .role-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .role-admin {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .role-user {
            background: rgba(99, 102, 241, 0.2);
            color: #6366f1;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1rem;
            border-radius: var(--radius);
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .admin-nav {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .nav-actions {
                justify-content: center;
            }

            .admin-tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <nav class="admin-nav">
                <h1>Panel de Administración</h1>
                <div class="nav-actions">
                    <a href="dashboard.html" class="btn-secondary">← Dashboard Usuario</a>
                    <button id="logout-btn" class="btn-danger">Cerrar Sesión</button>
                </div>
            </nav>
        </header>

        <main class="admin-main">
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="users">Usuarios</button>
                <button class="tab-btn" data-tab="articles">Artículos</button>
                <button class="tab-btn" data-tab="payments">Pagos</button>
                <button class="tab-btn" data-tab="activity">Actividad</button>
            </div>

            <div class="tab-content">
                <div id="users-tab" class="tab-pane">
                    <div id="users-content">
                        <div class="loading">Cargando usuarios...</div>
                    </div>
                </div>

                <div id="articles-tab" class="tab-pane" style="display: none;">
                    <div id="articles-content">
                        <div class="loading">Cargando artículos...</div>
                    </div>
                </div>

                <div id="payments-tab" class="tab-pane" style="display: none;">
                    <div id="payments-content">
                        <div class="loading">Cargando pagos...</div>
                    </div>
                </div>

                <div id="activity-tab" class="tab-pane" style="display: none;">
                    <div id="activity-content">
                        <div class="loading">Cargando actividad...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../utils/api.js"></script>
    <script src="../utils/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check authentication and admin role
            if (!auth.checkAuth()) return;
            if (!auth.checkAdmin()) return;

            // Tab switching
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabName = this.dataset.tab;

                    // Update active tab button
                    tabBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    // Show corresponding tab content
                    const tabPanes = document.querySelectorAll('.tab-pane');
                    tabPanes.forEach(pane => pane.style.display = 'none');
                    document.getElementById(tabName + '-tab').style.display = 'block';

                    // Load data for the tab
                    loadTabData(tabName);
                });
            });

            // Logout handler
            document.getElementById('logout-btn').addEventListener('click', function() {
                auth.logout();
            });

            // Load initial data
            loadTabData('users');
        });

        async function loadTabData(tabName) {
            const contentId = tabName + '-content';
            const content = document.getElementById(contentId);

            try {
                let data;
                switch (tabName) {
                    case 'users':
                        data = await api.getAllUsers();
                        renderUsersTable(content, data);
                        break;
                    case 'articles':
                        data = await api.getAllArticles();
                        renderArticlesTable(content, data);
                        break;
                    case 'payments':
                        data = await api.getAllPayments();
                        renderPaymentsTable(content, data);
                        break;
                    case 'activity':
                        data = await api.getActivityLogs();
                        renderActivityTable(content, data);
                        break;
                }
            } catch (error) {
                console.error(`Error loading ${tabName}:`, error);
                content.innerHTML = `
                    <div class="error-message">
                        Error al cargar ${tabName}. Inténtalo de nuevo más tarde.
                    </div>
                `;
            }
        }

        function renderUsersTable(container, users) {
            if (!users || users.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No hay usuarios registrados</p>';
                return;
            }

            // Stats
            const totalUsers = users.length;
            const adminUsers = users.filter(u => u.role === 'admin').length;
            const premiumUsers = users.filter(u => u.subscription_status === 'premium').length;

            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${totalUsers}</div>
                        <div class="stat-label">Total Usuarios</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${adminUsers}</div>
                        <div class="stat-label">Administradores</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${premiumUsers}</div>
                        <div class="stat-label">Usuarios Premium</div>
                    </div>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Suscripción</th>
                            <th>Fecha Registro</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach(user => {
                const registerDate = new Date(user.created_at).toLocaleDateString('es-ES');
                const roleClass = user.role === 'admin' ? 'role-admin' : 'role-user';
                const subscriptionClass = user.subscription_status === 'premium' ? 'status-active' : 'status-inactive';

                html += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.first_name} ${user.last_name}</td>
                        <td>${user.email}</td>
                        <td><span class="role-badge ${roleClass}">${user.role}</span></td>
                        <td><span class="status-badge ${subscriptionClass}">${user.subscription_status || 'free'}</span></td>
                        <td>${registerDate}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderArticlesTable(container, articles) {
            if (!articles || articles.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No hay artículos publicados</p>';
                return;
            }

            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${articles.length}</div>
                        <div class="stat-label">Total Artículos</div>
                    </div>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>Categoría</th>
                            <th>Vistas</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            articles.forEach(article => {
                const publishDate = new Date(article.created_at).toLocaleDateString('es-ES');

                html += `
                    <tr>
                        <td>${article.id}</td>
                        <td>${article.title}</td>
                        <td>${article.author_name || 'N/A'}</td>
                        <td>${article.category_name || 'N/A'}</td>
                        <td>${article.views || 0}</td>
                        <td>${publishDate}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderPaymentsTable(container, payments) {
            if (!payments || payments.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No hay pagos registrados</p>';
                return;
            }

            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Monto</th>
                            <th>Estado</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            payments.forEach(payment => {
                const paymentDate = new Date(payment.created_at).toLocaleDateString('es-ES');
                const statusClass = payment.status === 'completed' ? 'status-active' :
                                  payment.status === 'pending' ? 'status-pending' : 'status-inactive';

                html += `
                    <tr>
                        <td>${payment.id}</td>
                        <td>${payment.user_email || 'N/A'}</td>
                        <td>$${payment.amount}</td>
                        <td><span class="status-badge ${statusClass}">${payment.status}</span></td>
                        <td>${paymentDate}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderActivityTable(container, activities) {
            if (!activities || activities.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No hay actividad registrada</p>';
                return;
            }

            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Acción</th>
                            <th>Detalles</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            activities.forEach(activity => {
                const activityDate = new Date(activity.created_at).toLocaleDateString('es-ES');

                html += `
                    <tr>
                        <td>${activity.id}</td>
                        <td>${activity.user_email || 'N/A'}</td>
                        <td>${activity.action}</td>
                        <td>${activity.details || '-'}</td>
                        <td>${activityDate}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
