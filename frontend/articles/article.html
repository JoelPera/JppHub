<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo - JppHub</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .article-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: var(--text);
        }

        .article-header {
            background: rgba(15, 23, 42, 0.95);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .article-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .article-nav h1 {
            color: var(--text);
            margin: 0;
            font-size: 1.5rem;
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-secondary {
            padding: 0.5rem 1rem;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
        }

        .article-main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .article-content {
            background: var(--surface-strong);
            border-radius: var(--radius-large);
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .article-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .article-body {
            line-height: 1.8;
            color: var(--text);
            font-size: 1.1rem;
        }

        .article-body h2 {
            color: var(--text);
            margin: 2rem 0 1rem 0;
            font-size: 1.8rem;
        }

        .article-body h3 {
            color: var(--text);
            margin: 1.5rem 0 1rem 0;
            font-size: 1.4rem;
        }

        .article-body p {
            margin-bottom: 1.5rem;
        }

        .article-body ul,
        .article-body ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }

        .article-body li {
            margin-bottom: 0.5rem;
        }

        .article-body blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 1rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: var(--text-muted);
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .article-nav {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .nav-actions {
                justify-content: center;
            }

            .article-title {
                font-size: 2rem;
            }

            .article-main {
                padding: 1rem;
            }

            .article-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="article-container">
        <header class="article-header">
            <nav class="article-nav">
                <h1>JppHub</h1>
                <div class="nav-actions">
                    <a href="../index.html" class="btn-secondary">← Volver al inicio</a>
                    <a href="../pages/dashboard.html" class="btn-secondary">Dashboard</a>
                </div>
            </nav>
        </header>

        <main class="article-main">
            <div class="article-content">
                <div id="article-content">
                    <div class="loading">Cargando artículo...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="../utils/api.js"></script>
    <script src="../utils/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (!articleId) {
                showError('ID de artículo no especificado');
                return;
            }

            loadArticle(articleId);
        });

        async function loadArticle(articleId) {
            try {
                // Increment view count
                try {
                    await api.incrementArticleViews(articleId);
                } catch (viewError) {
                    console.warn('Could not increment views:', viewError);
                }

                // Load article data
                const article = await api.getArticle(articleId);

                renderArticle(article);
            } catch (error) {
                console.error('Error loading article:', error);
                showError('Error al cargar el artículo. Puede que no exista o haya sido eliminado.');
            }
        }

        function renderArticle(article) {
            const container = document.getElementById('article-content');
            const publishDate = new Date(article.created_at).toLocaleDateString('es-ES', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            container.innerHTML = `
                <h1 class="article-title">${article.title}</h1>
                <div class="article-meta">
                    <span>Publicado el ${publishDate}</span>
                    <span>${article.views || 0} vistas</span>
                </div>
                <div class="article-body">
                    ${article.content || article.excerpt || 'Contenido no disponible'}
                </div>
            `;
        }

        function showError(message) {
            const container = document.getElementById('article-content');
            container.innerHTML = `
                <div class="error-message">
                    ${message}
                </div>
                <a href="../index.html" class="btn-secondary" style="margin-top: 1rem; display: inline-block;">Volver al inicio</a>
            `;
        }
    </script>
</body>
</html>
