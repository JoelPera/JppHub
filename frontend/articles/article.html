<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo · JppHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .article-page { max-width: 760px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
        .article-back { color: var(--text-muted); font-size: .92rem; margin-bottom: 2rem; display: inline-flex; align-items: center; gap: .4rem; }
        .article-back:hover { color: var(--primary); }
        .article-meta-top { display: flex; gap: .8rem; align-items: center; color: var(--text-muted); font-size: .88rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .article-title { font-family: var(--font-display); font-size: clamp(2rem, 4.5vw, 3.2rem); font-weight: 800; letter-spacing: -.02em; color: var(--text-strong); margin: 0 0 1rem; line-height: 1.15; }
        .article-description { font-size: 1.2rem; color: var(--text-muted); margin: 0 0 2.5rem; border-left: 3px solid var(--primary); padding-left: 1rem; }
        .article-body {
            font-family: 'Lora', Georgia, serif;
            font-size: 1.12rem;
            line-height: 1.8;
            color: var(--text);
        }
        .article-body h1, .article-body h2, .article-body h3 {
            font-family: var(--font-display);
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }
        .article-body h2 { font-size: 1.7rem; }
        .article-body h3 { font-size: 1.3rem; }
        .article-body p { margin: 0 0 1.3rem; }
        .article-body a { color: var(--primary); text-decoration: underline; }
        .article-body ul, .article-body ol { padding-left: 1.5rem; margin: 0 0 1.3rem; }
        .article-body li { margin-bottom: .5rem; }
        .article-body blockquote {
            border-left: 3px solid var(--primary);
            padding: .5rem 0 .5rem 1.5rem;
            font-style: italic;
            color: var(--text-muted);
            margin: 1.5rem 0;
        }
        .article-body code { background: var(--surface); padding: .15rem .35rem; border-radius: 4px; font-size: .9em; }
        .article-body pre { background: var(--bg-elev); padding: 1rem; border-radius: var(--radius); overflow-x: auto; border: 1px solid var(--border); }
        .article-body img { border-radius: var(--radius); margin: 1.5rem 0; }
        .article-footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: .9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .author-card {
            display: flex; align-items: center; gap: .75rem;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <a href="/" class="logo" data-testid="article-nav-logo">JppHub</a>
        <nav aria-label="Navegación principal">
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/#blog">Artículos</a></li>
                <li><a href="/#pricing">Planes</a></li>
            </ul>
        </nav>
        <div class="auth-buttons" id="authButtons">
            <a href="/login" class="login-btn">Ingresar</a>
            <a href="/register" class="register-btn">Empezar</a>
        </div>
    </header>

    <main>
        <article class="article-page">
            <a href="/#blog" class="article-back" data-testid="article-back-link">← Volver a artículos</a>
            <div id="article-content" data-testid="article-content">
                <p style="color: var(--text-muted); text-align: center; padding: 3rem;">Cargando artículo…</p>
            </div>
        </article>
    </main>

    <footer>
        <p>© 2026 JppHub</p>
    </footer>

    <script src="/utils/api.js"></script>
    <script src="/utils/auth.js"></script>
    <script>
    (function(){
        function esc(s){ return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
        function fmtDate(s){ try { return new Date(s).toLocaleDateString('es-ES',{day:'2-digit', month:'long', year:'numeric'});} catch { return ''; }}

        // Contenido del artículo puede venir como HTML (desde Quill) o texto plano
        function renderBody(content) {
            if (!content) return '';
            // Detect if content already has HTML tags
            const hasHtml = /<\/?[a-z][\s\S]*>/i.test(content);
            if (hasHtml) return content; // Quill output ya sanitizado en el backend / confiamos en autores revisados
            // Texto plano: preservar saltos de línea
            return esc(content).split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
        }

        async function load() {
            const slug = window.location.pathname.replace(/^\/articles\//, '').replace(/\/$/, '');
            const container = document.getElementById('article-content');
            if (!slug) { container.innerHTML = '<p>Artículo no encontrado.</p>'; return; }
            try {
                const a = await api.getArticleBySlug(slug);
                document.title = `${a.title} · JppHub`;
                container.innerHTML = `
                    <div class="article-meta-top">
                        <span class="badge badge-approved">${esc(a.category || 'General')}</span>
                        <span>${fmtDate(a.publishedAt || a.createdAt)}</span>
                        <span>·</span>
                        <span>${a.views || 0} vistas</span>
                    </div>
                    <h1 class="article-title" data-testid="article-detail-title">${esc(a.title)}</h1>
                    <p class="article-description" data-testid="article-detail-description">${esc(a.description || '')}</p>
                    <div class="article-body" data-testid="article-detail-body">${renderBody(a.content)}</div>
                    <div class="article-footer">
                        <div class="author-card">
                            <div class="avatar">${esc((a.authorName || a.author || 'A').slice(0,1).toUpperCase())}</div>
                            <div>
                                <div style="color: var(--text);">${esc(a.authorName || a.author || 'Anónimo')}</div>
                                <div style="color: var(--text-subtle); font-size: .85rem;">Publicado en JppHub</div>
                            </div>
                        </div>
                        <div>
                            <a href="/register" class="btn-secondary btn-sm">Publica tú también →</a>
                        </div>
                    </div>
                `;
                // Incrementar vistas silenciosamente
                api.request(`/articles/${a.id}/views`, { method: 'PATCH' }).catch(() => {});
            } catch (err) {
                container.innerHTML = `
                    <div class="empty" data-testid="article-not-found">
                        <h2>Artículo no encontrado</h2>
                        <p>Este artículo no existe o aún no ha sido aprobado.</p>
                        <a href="/" class="btn-primary">← Volver al inicio</a>
                    </div>`;
            }
        }

        function updateNavbar() {
            const el = document.getElementById('authButtons');
            if (!el) return;
            if (auth.isAuthenticated) {
                const u = auth.getUser() || {};
                el.innerHTML = `
                    <a href="/dashboard" class="btn-secondary btn-sm">Dashboard</a>
                    <button class="btn-danger btn-sm" onclick="auth.logout()">Salir</button>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => { updateNavbar(); load(); });
    })();
    </script>
</body>
</html>
