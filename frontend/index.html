<!doctype html>
<html lang="es" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230A0A0A'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='62' font-weight='700' text-anchor='middle' fill='white'%3EJ%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="JppHub — La plataforma editorial SaaS donde expertos publican sobre IA y automatización. Contenido curado, publicado al instante." />
    <meta name="theme-color" content="#0A0A0A" />
    <title>JppHub · Editorial SaaS sobre IA y Automatización</title>

    <!-- Cabinet Grotesk + Satoshi (Fontshare) -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500,700,900&display=swap" />
    <!-- Instrument Serif (Google) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" />

    <script>
      (function () {
        try {
          const t = localStorage.getItem('jpphub_theme');
          const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (t === 'dark' || (!t && prefers)) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="h-full bg-white dark:bg-ink-950 text-ink-900 dark:text-ink-50 antialiased font-satoshi">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
