server {
    listen 80;
    
    # Frontend SPA - serve static files with React Router support
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # SPA routing: fallback to index.html for any non-existent paths
        try_files $uri $uri/ /index.html;
        
        # Cache control for SPA
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Static assets - long cache
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # API proxy - forward to backend service:4000
    location /api/ {
        proxy_pass http://backend:4000/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
